<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>turbo_net | Test de velocidad</title>
  <style>
    :root{
      --bg:#020817;
      --panel:rgba(8,20,43,.88);
      --panel-2:rgba(12,28,56,.82);
      --border:rgba(157,181,224,.22);
      --text:#f8fbff;
      --muted:#95a9c9;
      --cyan:#25d9ff;
      --blue:#2f7dff;
      --green:#23d16f;
      --red:#ff5c7c;
      --shadow:0 30px 90px rgba(0,0,0,.34);
      --radius:30px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(37,217,255,.18), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(47,125,255,.22), transparent 36%),
        linear-gradient(180deg,#06142c 0%,#020817 100%);
      padding:32px;
    }

    .page{max-width:1400px;margin:0 auto}

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      margin-bottom:28px;
    }

    .brand{display:flex;align-items:center;gap:16px}

    .logo{
      width:52px;
      height:52px;
      border-radius:17px;
      display:grid;
      place-items:center;
      font-size:25px;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 16px 34px rgba(37,217,255,.25);
    }

    h1{
      font-size:3rem;
      line-height:.95;
      font-weight:950;
      letter-spacing:-2.4px;
    }

    .brand p{margin-top:6px;color:#c8dcff;font-size:1rem}

    .server-pill{
      border:1px solid var(--border);
      background:rgba(9,22,48,.72);
      padding:13px 19px;
      border-radius:999px;
      color:#d7e8ff;
      white-space:nowrap;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.62fr) minmax(370px,.92fr);
      gap:20px;
      align-items:start;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }

    .main-card{
      min-height:790px;
      padding:34px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .gauge-stage{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      margin-bottom:52px;
      padding-top:8px;
    }

    .gauge-box{
      position:relative;
      width:min(560px,82vw);
      aspect-ratio:1.42/1;
      display:grid;
      place-items:center;
      margin:0 auto;
    }

    .gauge-svg{
      width:100%;
      height:100%;
      overflow:visible;
      filter:drop-shadow(0 0 24px rgba(37,217,255,.10));
    }

    .arc-bg{
      fill:none;
      stroke:rgba(60,78,112,.72);
      stroke-width:38;
      stroke-linecap:butt;
    }

    .arc-active{
      fill:none;
      stroke:url(#arcGradient);
      stroke-width:38;
      stroke-linecap:round;
      transition:d .12s linear;
    }

    .inner-ring{
      fill:#020817;
      stroke:rgba(157,181,224,.12);
      stroke-width:1.2;
      filter:url(#innerShadow);
    }

    .tick-line{
      stroke:rgba(190,210,245,.32);
      stroke-width:2;
      stroke-linecap:round;
    }

    .tick-line.major{
      stroke:rgba(230,241,255,.62);
      stroke-width:3;
    }

    .needle-line{
      stroke:url(#needleGradient);
      stroke-width:6;
      stroke-linecap:round;
      filter:url(#glow);
      transition:x2 .10s linear, y2 .10s linear;
    }

    .needle-tip{
      fill:#fff;
      filter:url(#glowSoft);
    }

    .center-cap-outer{fill:rgba(2,8,23,.92)}
    .center-cap-inner{fill:url(#capGradient)}

    .gauge-readout{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-21%);
      width:74%;
      text-align:center;
      z-index:5;
      pointer-events:none;
    }

    .gauge-label{
      color:#22dfff;
      font-size:.9rem;
      font-weight:900;
      letter-spacing:4px;
      text-transform:uppercase;
      margin-bottom:18px;
    }

    .gauge-value{
      font-size:clamp(4.4rem,8.2vw,7.4rem);
      font-weight:950;
      line-height:.9;
      letter-spacing:-5px;
      text-shadow:0 8px 28px rgba(0,0,0,.32);
    }

    .gauge-unit{color:var(--muted);font-size:1.05rem;margin-top:10px}

    .scale{
      width:min(520px,78vw);
      display:flex;
      justify-content:space-between;
      color:#7d92b8;
      font-size:1rem;
      margin-top:10px;
      padding:0 20px;
    }

    .controls{
      margin-top:0;
      padding-top:24px;
      border-top:1px solid rgba(157,181,224,.12);
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      width:100%;
      position:relative;
      z-index:2;
    }

    select,button{
      border:1px solid var(--border);
      border-radius:999px;
      min-height:58px;
      padding:16px 24px;
      color:var(--text);
      background:rgba(18,33,63,.90);
      font-size:1rem;
      outline:none;
    }

    select{min-width:220px;cursor:pointer}

    button{
      cursor:pointer;
      font-weight:900;
      transition:transform .18s ease,opacity .18s ease,box-shadow .18s ease;
    }

    button:hover{transform:translateY(-2px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{
      border:none;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 14px 28px rgba(37,217,255,.22);
      padding-inline:30px;
    }

    .secondary{background:rgba(30,43,70,.92)}

    .side{display:flex;flex-direction:column;gap:18px}
    .side-card{padding:22px}
    .side-card h2{font-size:1.15rem;margin-bottom:18px}

    .results-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .metric{
      min-height:126px;
      border:1px solid var(--border);
      border-radius:22px;
      background:rgba(10,22,47,.78);
      padding:18px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .metric span{color:#a8bad8;font-size:.94rem}
    .metric strong{font-size:2rem;line-height:1;font-weight:950;letter-spacing:-1px;margin-top:9px}
    .metric small{color:#91a6c7;font-size:.86rem;margin-top:7px}

    .rating{
      margin-top:16px;
      display:inline-flex;
      max-width:100%;
      border-radius:999px;
      padding:11px 16px;
      background:rgba(35,209,111,.16);
      color:#e5ffef;
      font-weight:900;
      font-size:.94rem;
    }

    .status-box{
      min-height:80px;
      display:flex;
      align-items:center;
      border:1px solid rgba(37,217,255,.28);
      border-radius:20px;
      background:rgba(13,74,116,.28);
      color:#e5f7ff;
      line-height:1.5;
      padding:18px;
    }

    .steps{list-style:none;display:grid;gap:12px;margin-top:16px;color:#a9bbd8}
    .steps li{display:flex;align-items:center;gap:10px}
    .dot{
      width:15px;height:15px;border-radius:50%;background:#334866;
      box-shadow:0 0 0 4px rgba(51,72,102,.24);
      transition:all .22s ease;
      flex-shrink:0;
    }
    .dot.done{background:var(--green);box-shadow:0 0 0 4px rgba(35,209,111,.16)}
    .dot.active{background:var(--cyan);box-shadow:0 0 0 4px rgba(37,217,255,.16),0 0 18px rgba(37,217,255,.38)}

    .history-list{display:grid;gap:10px}
    .history-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--border);
      background:rgba(10,22,47,.72);
      color:#dde9fb;
      font-size:.94rem;
    }
    .history-item small{display:block;color:#93a8ca;margin-bottom:4px}
    .history-score{font-weight:950;white-space:nowrap;color:#f8fbff}

    @media(max-width:1120px){
      .layout{grid-template-columns:1fr}
      .main-card{min-height:auto}
    }

    @media(max-width:720px){
      body{padding:16px}
      header{flex-direction:column;align-items:flex-start}
      h1{font-size:2.35rem}
      .brand p{font-size:.95rem}
      .main-card{padding:22px 16px}
      .gauge-stage{margin-bottom:34px}
      .gauge-box{width:min(500px,94vw)}
      .results-grid{grid-template-columns:1fr}
      select,button{width:100%}
      .controls{flex-direction:column}
      .gauge-readout{transform:translate(-50%,-16%)}
      .gauge-value{letter-spacing:-3px}
      .scale{margin-top:10px;font-size:.92rem;width:92%}
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <div class="logo">⚡</div>
        <div>
          <h1>turbo_net</h1>
          <p>Test de velocidad</p>
        </div>
      </div>
      <div class="server-pill">Cloudflare</div>
    </header>

    <main class="layout">
      <section class="card main-card">
        <div class="gauge-stage">
          <div class="gauge-box">
            <svg class="gauge-svg" viewBox="0 0 620 430" aria-hidden="true">
              <defs>
                <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#25d9ff"/>
                  <stop offset="60%" stop-color="#30e4c9"/>
                  <stop offset="100%" stop-color="#23d16f"/>
                </linearGradient>
                <linearGradient id="needleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#ffffff"/>
                  <stop offset="55%" stop-color="#25d9ff"/>
                  <stop offset="100%" stop-color="#2f7dff"/>
                </linearGradient>
                <radialGradient id="capGradient">
                  <stop offset="0%" stop-color="#f8fbff"/>
                  <stop offset="58%" stop-color="#8acbff"/>
                  <stop offset="100%" stop-color="#2f7dff"/>
                </radialGradient>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#000000" flood-opacity=".5"/>
                </filter>
              </defs>

              <circle class="inner-ring" cx="310" cy="310" r="188"></circle>
              <path class="arc-bg" id="arcBg"></path>
              <path class="arc-active" id="arcActive"></path>
              <g id="tickGroup"></g>
              <line class="needle-line" id="needleLine" x1="310" y1="310" x2="210" y2="410"></line>
              <circle class="needle-tip" id="needleTip" cx="210" cy="410" r="7"></circle>
              <circle class="center-cap-outer" cx="310" cy="310" r="35"></circle>
              <circle class="center-cap-inner" cx="310" cy="310" r="25"></circle>
            </svg>

            <div class="gauge-readout">
              <div class="gauge-label" id="gaugeLabel">LISTO</div>
              <div class="gauge-value" id="gaugeValue">0.00</div>
              <div class="gauge-unit">Mbps</div>
            </div>
          </div>
          <div class="scale"><span>0</span><span>100</span><span>250</span><span>500</span><span>1000+</span></div>
        </div>

        <div class="controls">
          <select id="modeSelect">
            <option value="recommended">Modo recomendado</option>
            <option value="light">Modo ligero</option>
            <option value="strong">Modo intensivo</option>
          </select>
          <button class="primary" id="startBtn">Iniciar test completo</button>
          <button class="secondary" id="copyBtn">Copiar resultado</button>
          <button class="secondary" id="resetBtn">Reiniciar</button>
        </div>
      </section>

      <aside class="side">
        <section class="card side-card">
          <h2>Resultados</h2>
          <div class="results-grid">
            <div class="metric"><span>Ping</span><strong id="pingResult">--</strong><small>ms</small></div>
            <div class="metric"><span>Jitter</span><strong id="jitterResult">--</strong><small>ms</small></div>
            <div class="metric"><span>Descarga</span><strong id="downloadResult">--</strong><small>Mbps</small></div>
            <div class="metric"><span>Subida</span><strong id="uploadResult">--</strong><small>Mbps</small></div>
            <div class="metric"><span>Pérdida HTTP</span><strong id="lossResult">--</strong><small>%</small></div>
            <div class="metric"><span>Datos usados</span><strong id="dataUsedResult">--</strong><small>MB aprox.</small></div>
          </div>
          <div class="rating" id="ratingResult">Esperando prueba</div>
        </section>

        <section class="card side-card">
          <h2>Estado</h2>
          <div class="status-box" id="statusBox">Presiona “Iniciar test completo”.</div>
          <ul class="steps">
            <li><span class="dot" id="stepPing"></span> Latencia</li>
            <li><span class="dot" id="stepDownload"></span> Descarga</li>
            <li><span class="dot" id="stepUpload"></span> Subida</li>
            <li><span class="dot" id="stepSummary"></span> Resumen</li>
          </ul>
        </section>

        <section class="card side-card">
          <h2>Historial</h2>
          <div class="history-list" id="historyList"></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const els={
      arcBg:document.getElementById('arcBg'),
      arcActive:document.getElementById('arcActive'),
      tickGroup:document.getElementById('tickGroup'),
      needleLine:document.getElementById('needleLine'),
      needleTip:document.getElementById('needleTip'),
      gaugeValue:document.getElementById('gaugeValue'),
      gaugeLabel:document.getElementById('gaugeLabel'),
      modeSelect:document.getElementById('modeSelect'),
      startBtn:document.getElementById('startBtn'),
      copyBtn:document.getElementById('copyBtn'),
      resetBtn:document.getElementById('resetBtn'),
      pingResult:document.getElementById('pingResult'),
      jitterResult:document.getElementById('jitterResult'),
      downloadResult:document.getElementById('downloadResult'),
      uploadResult:document.getElementById('uploadResult'),
      lossResult:document.getElementById('lossResult'),
      dataUsedResult:document.getElementById('dataUsedResult'),
      ratingResult:document.getElementById('ratingResult'),
      statusBox:document.getElementById('statusBox'),
      stepPing:document.getElementById('stepPing'),
      stepDownload:document.getElementById('stepDownload'),
      stepUpload:document.getElementById('stepUpload'),
      stepSummary:document.getElementById('stepSummary'),
      historyList:document.getElementById('historyList')
    };

    const HISTORY_KEY='turbo_net_pro_history_v3';
    const CX=310;
    const CY=310;
    const R=230;
    const ARC_START=135;
    const ARC_END=405;
    const NEEDLE_R=172;

    let displayedSpeed=0;
    let targetSpeed=0;
    let loopId=null;
    let totalDataUsedMb=0;
    let lastResult=null;
    let pendingTicker=null;

    function polarPoint(cx,cy,r,angleDeg){
      const rad=angleDeg*Math.PI/180;
      return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
    }

    function arcPath(startAngle,endAngle,r=R){
      const start=polarPoint(CX,CY,r,startAngle);
      const end=polarPoint(CX,CY,r,endAngle);
      const largeArc=Math.abs(endAngle-startAngle)>180?1:0;
      return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
    }

    function createGauge(){
      els.arcBg.setAttribute('d',arcPath(ARC_START,ARC_END));
      els.arcActive.setAttribute('d',arcPath(ARC_START,ARC_START+.01));
      els.tickGroup.innerHTML='';

      const count=28;
      for(let i=0;i<=count;i++){
        const angle=ARC_START+((ARC_END-ARC_START)/count)*i;
        const major=i%7===0;
        const outer=polarPoint(CX,CY,R+7,angle);
        const inner=polarPoint(CX,CY,R-(major?25:16),angle);
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',inner.x.toFixed(2));
        line.setAttribute('y1',inner.y.toFixed(2));
        line.setAttribute('x2',outer.x.toFixed(2));
        line.setAttribute('y2',outer.y.toFixed(2));
        line.setAttribute('class','tick-line'+(major?' major':''));
        els.tickGroup.appendChild(line);
      }

      renderGauge(0,'LISTO');
    }

    function fmt(value,digits=2){return Number.isFinite(value)?value.toFixed(digits):'--'}
    function setStatus(text){els.statusBox.textContent=text}
    function setBusy(state){els.startBtn.disabled=state;els.modeSelect.disabled=state}
    function setStep(el,state){el.classList.toggle('done',state);el.classList.remove('active')}
    function activateStep(el){[els.stepPing,els.stepDownload,els.stepUpload,els.stepSummary].forEach(x=>x.classList.remove('active'));el.classList.add('active')}
    function resetSteps(){[els.stepPing,els.stepDownload,els.stepUpload,els.stepSummary].forEach(x=>{x.classList.remove('done');x.classList.remove('active')})}

    function speedRatio(speed){
      const safe=Math.max(0,Math.min(speed,1000));
      return Math.log10(safe+1)/Math.log10(1001);
    }

    function renderGauge(speed,label='LISTO'){
      const ratio=speedRatio(speed);
      const angle=ARC_START+ratio*(ARC_END-ARC_START);
      const needle=polarPoint(CX,CY,NEEDLE_R,angle);
      els.arcActive.setAttribute('d',arcPath(ARC_START,Math.max(ARC_START+.01,angle)));
      els.needleLine.setAttribute('x1',CX);
      els.needleLine.setAttribute('y1',CY);
      els.needleLine.setAttribute('x2',needle.x.toFixed(2));
      els.needleLine.setAttribute('y2',needle.y.toFixed(2));
      els.needleTip.setAttribute('cx',needle.x.toFixed(2));
      els.needleTip.setAttribute('cy',needle.y.toFixed(2));
      els.gaugeValue.textContent=fmt(speed,2);
      els.gaugeLabel.textContent=label;
    }

    function easeOutCubic(t){return 1-Math.pow(1-t,3)}

    function animateGaugeTo(value,label='LISTO',duration=800){
      if(loopId) cancelAnimationFrame(loopId);
      if(pendingTicker) clearInterval(pendingTicker);
      const start=displayedSpeed;
      const end=Number.isFinite(value)?value:0;
      const startTime=performance.now();
      function step(now){
        const t=Math.min((now-startTime)/duration,1);
        displayedSpeed=start+(end-start)*easeOutCubic(t);
        renderGauge(displayedSpeed,label);
        if(t<1){loopId=requestAnimationFrame(step)}else{displayedSpeed=end;renderGauge(end,label)}
      }
      loopId=requestAnimationFrame(step);
    }

    function startLiveGauge(label){
      if(loopId) cancelAnimationFrame(loopId);
      if(pendingTicker) clearInterval(pendingTicker);
      function loop(){
        displayedSpeed += (targetSpeed-displayedSpeed)*0.12;
        renderGauge(displayedSpeed,label);
        loopId=requestAnimationFrame(loop);
      }
      loopId=requestAnimationFrame(loop);
    }

    function startPendingGauge(label){
      if(loopId) cancelAnimationFrame(loopId);
      if(pendingTicker) clearInterval(pendingTicker);
      let seed=Math.max(displayedSpeed,8);
      targetSpeed=seed;
      pendingTicker=setInterval(()=>{
        seed=Math.max(8,seed+(Math.random()-.44)*12);
        targetSpeed=seed;
      },280);
      startLiveGauge(label);
    }

    function stopLiveGauge(finalSpeed,label){
      if(loopId) cancelAnimationFrame(loopId);
      if(pendingTicker) clearInterval(pendingTicker);
      pendingTicker=null;
      animateGaugeTo(finalSpeed,label,760);
    }

    function getModeConfig(){
      const mode=els.modeSelect.value;
      if(mode==='light') return {downloadBytes:10*1024*1024, uploadBytes:3*1024*1024, pingSamples:5};
      if(mode==='strong') return {downloadBytes:40*1024*1024, uploadBytes:12*1024*1024, pingSamples:8};
      return {downloadBytes:24*1024*1024, uploadBytes:7*1024*1024, pingSamples:6};
    }

    function resetUI(){
      totalDataUsedMb=0;
      lastResult=null;
      targetSpeed=0;
      if(pendingTicker) clearInterval(pendingTicker);
      pendingTicker=null;
      els.pingResult.textContent='--';
      els.jitterResult.textContent='--';
      els.downloadResult.textContent='--';
      els.uploadResult.textContent='--';
      els.lossResult.textContent='--';
      els.dataUsedResult.textContent='--';
      els.ratingResult.textContent='Esperando prueba';
      setStatus('Presiona “Iniciar test completo”.');
      resetSteps();
      animateGaugeTo(0,'LISTO',650);
    }

    async function measurePing(samples){
      const times=[];
      let failed=0;
      for(let i=0;i<samples;i++){
        const start=performance.now();
        try{
          const r=await fetch(`https://speed.cloudflare.com/__down?bytes=0&r=${Date.now()}-${i}`,{cache:'no-store'});
          if(!r.ok) failed++;
        }catch{failed++}
        times.push(performance.now()-start);
        await new Promise(r=>setTimeout(r,115));
      }
      const valid=times.filter(Number.isFinite);
      const avg=valid.reduce((a,b)=>a+b,0)/valid.length;
      const jitter=valid.slice(1).map((v,i)=>Math.abs(v-valid[i])).reduce((a,b)=>a+b,0)/Math.max(valid.length-1,1);
      return {average:avg,jitter,loss:(failed/samples)*100};
    }

    async function measureDownload(bytes){
      const measId=Date.now();
      const url=`https://speed.cloudflare.com/__down?measId=${measId}&bytes=${bytes}&r=${Math.random()}`;
      targetSpeed=0;
      startLiveGauge('DESCARGA');
      const start=performance.now();
      let loaded=0;
      const response=await fetch(url,{cache:'no-store'});
      if(!response.ok) throw new Error('No se pudo medir la descarga.');

      if(!response.body){
        const blob=await response.blob();
        loaded=blob.size;
      }else{
        const reader=response.body.getReader();
        while(true){
          const {done,value}=await reader.read();
          if(done) break;
          loaded+=value.length;
          const elapsed=(performance.now()-start)/1000;
          if(elapsed>0) targetSpeed=(loaded*8)/elapsed/1000/1000;
        }
      }
      const elapsed=(performance.now()-start)/1000;
      const speed=(loaded*8)/elapsed/1000/1000;
      totalDataUsedMb+=loaded/1024/1024;
      stopLiveGauge(speed,'DESCARGA');
      return speed;
    }

    function randomBlob(sizeBytes){
      const chunks=[];
      const chunkSize=65536;
      let remaining=sizeBytes;
      while(remaining>0){
        const size=Math.min(chunkSize,remaining);
        const arr=new Uint8Array(size);
        crypto.getRandomValues(arr);
        chunks.push(arr);
        remaining-=size;
      }
      return new Blob(chunks);
    }

    async function measureUpload(bytes){
      const measId=Date.now();
      const url=`https://speed.cloudflare.com/__up?measId=${measId}&bytes=${bytes}&r=${Math.random()}`;
      const blob=randomBlob(bytes);
      startPendingGauge('SUBIDA');
      const start=performance.now();

      try{
        await fetch(url,{
          method:'POST',
          mode:'no-cors',
          cache:'no-store',
          body:blob
        });
      }catch(error){
        throw new Error('No se pudo medir la subida desde este navegador o red.');
      }

      const elapsed=(performance.now()-start)/1000;
      const speed=(blob.size*8)/elapsed/1000/1000;
      totalDataUsedMb+=blob.size/1024/1024;
      stopLiveGauge(speed,'SUBIDA');
      return speed;
    }

    function rating(download,ping){
      if(download>=300 && ping<=30) return 'Excelente';
      if(download>=100 && ping<=55) return 'Muy buena';
      if(download>=40) return 'Buena';
      if(download>=15) return 'Aceptable';
      return 'Limitada';
    }

    function saveHistory(result){
      const list=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
      list.unshift(result);
      localStorage.setItem(HISTORY_KEY,JSON.stringify(list.slice(0,6)));
      renderHistory();
    }

    function renderHistory(){
      const list=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
      if(!list.length){
        els.historyList.innerHTML='<div class="history-item">Sin resultados guardados</div>';
        return;
      }
      els.historyList.innerHTML=list.map(item=>`
        <div class="history-item">
          <div><small>${item.date}</small><div>${item.ping} ms ping • ${item.jitter} ms jitter</div></div>
          <div class="history-score">${item.download} / ${item.upload}</div>
        </div>`).join('');
    }

    async function copyResult(){
      if(!lastResult){setStatus('Primero realiza una prueba.');return}
      const text=`turbo_net\nFecha: ${lastResult.date}\nPing: ${lastResult.ping} ms\nJitter: ${lastResult.jitter} ms\nDescarga: ${lastResult.download} Mbps\nSubida: ${lastResult.upload} Mbps\nPérdida HTTP: ${lastResult.loss} %\nDatos usados: ${lastResult.dataUsed} MB aprox.\nEvaluación: ${lastResult.rating}`;
      await navigator.clipboard.writeText(text);
      setStatus('Resultado copiado.');
    }

    async function runTest(){
      resetUI();
      setBusy(true);
      try{
        const config=getModeConfig();

        activateStep(els.stepPing);
        setStatus('Midiendo latencia...');
        const ping=await measurePing(config.pingSamples);
        els.pingResult.textContent=fmt(ping.average,0);
        els.jitterResult.textContent=fmt(ping.jitter,0);
        els.lossResult.textContent=fmt(ping.loss,0);
        setStep(els.stepPing,true);

        activateStep(els.stepDownload);
        setStatus('Midiendo descarga...');
        const down=await measureDownload(config.downloadBytes);
        els.downloadResult.textContent=fmt(down,2);
        setStep(els.stepDownload,true);

        activateStep(els.stepUpload);
        setStatus('Midiendo subida...');
        const up=await measureUpload(config.uploadBytes);
        els.uploadResult.textContent=fmt(up,2);
        setStep(els.stepUpload,true);

        els.dataUsedResult.textContent=fmt(totalDataUsedMb,0);
        const evalText=rating(down,ping.average);
        els.ratingResult.textContent=evalText;
        setStep(els.stepSummary,true);
        setStatus('Prueba finalizada.');

        lastResult={
          date:new Date().toLocaleString('es-CL'),
          ping:fmt(ping.average,0),
          jitter:fmt(ping.jitter,0),
          download:fmt(down,2),
          upload:fmt(up,2),
          loss:fmt(ping.loss,0),
          dataUsed:fmt(totalDataUsedMb,0),
          rating:evalText
        };
        saveHistory(lastResult);
      }catch(error){
        setStatus(error.message||'Ocurrió un error durante la prueba.');
      }finally{
        setBusy(false);
      }
    }

    els.startBtn.addEventListener('click',runTest);
    els.copyBtn.addEventListener('click',copyResult);
    els.resetBtn.addEventListener('click',resetUI);

    createGauge();
    renderHistory();
    resetUI();
  </script>
</body>
</html>
